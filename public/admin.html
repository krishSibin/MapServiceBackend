<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapService Backend Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #020617;
            --bg-secondary: #0f172a;
            --accent-blue: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .admin-box {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 24px;
            width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--accent-blue);
        }

        p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: #000;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #10b981;
            font-family: 'Monaco', 'Consolas', monospace;
            padding: 1rem;
            margin-bottom: 1.5rem;
            resize: none;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        #status {
            margin-top: 1rem;
            font-size: 0.8rem;
            text-align: center;
        }

        .success { color: #10b981; }
        .error { color: #f43f5e; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h1>Backend Control Center</h1>
        <p>Paste GeoJSON here to update the live public map.</p>
        
        <textarea id="geojsonInput" placeholder='{ "type": "FeatureCollection", ... }'></textarea>
        
        <button onclick="updateMap()">Push Update to Map</button>
        <div id="status"></div>
    </div>

    <script>
        async function updateMap() {
            const input = document.getElementById('geojsonInput').value;
            const status = document.getElementById('status');
            
            try {
                const data = JSON.parse(input);
                const response = await fetch('/api/geojson', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    status.innerHTML = '<span class="success">✓ Map updated successfully!</span>';
                } else {
                    throw new Error('Failed to update');
                }
            } catch (err) {
                status.innerHTML = '<span class="error">✗ ' + err.message + '</span>';
            }
        }
    </script>
</body>
</html>
